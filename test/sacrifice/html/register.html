<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Page</title>
  <link rel="stylesheet" href="../css/all.min.css">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/login.css">
</head>

<body>



  <div class="container container vh-100 d-flex justify-content-center align-items-center my-5 py-5">
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12">

          <h1 class="welcome mb-5">Welcome To Login Page</h1>

        <form class="login-box">
          <div class="mb-3">
            <label for="name" id="name">Name</label>
            <input type="text" class="form-control mb-3" id="username" aria-describedby="emailHelp" required>

            <label for="exampleInputEmail1" class="form-label">Email address</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required>
            <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
          </div>

          <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" min="6" max="25" required>
          </div>

          <button type="submit" class="btn btn-primary" id="submit"  onclick="register()">Submit</button>
        </form>


      </div>
    </div>
  </div>




  <script src="../js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</body>

</html>
