<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regsiter Page</title>
  <link rel="stylesheet" href="../css/all.min.css">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/login.css">
</head>

<body>

  <div class="container vh-100 d-flex justify-content-center align-items-center">

  <div class="form-box p-4">
    <h1 class="text-center">Register Form</h1>
    <hr>

    <label for="fname" class="d-block mb-2">FirstName:</label>
    <input type="text" id="fname" class="form-control mb-3">

    <label for="lname" class="d-block mb-2">LastName:</label>
    <input type="text" id="lname" class="form-control mb-3">

    <label for="email" class="d-block mb-2">Email:</label>
    <input type="email" id="email" class="form-control mb-3">

    <label for="password" class="d-block mb-2">Password:</label>
    <input type="password" id="password" class="form-control mb-3">

    <div class="login">
      <p>Already have an account? <a href="login.html">Login</a></p>
    </div>

    <button class="btn btn-primary w-100" id="addBtn" onclick="register()">Register</button>
  </div>

</div>

  <script src="../js/bootstrap.bundle.min.js"></script>
  <script src="../js/log.js"></script>
</body>

</html>
