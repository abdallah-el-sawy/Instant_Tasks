<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>LAB2 JS</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/all.min.css">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#"> Fake Store </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto gap-3">
            <li class="nav-item">
              <a
                href="#"
                class="nav-link category-link active"
                data-category="all"
              >
                All
              </a>
            </li>

            <li class="nav-item">
              <a
                href="#"
                class="nav-link category-link"
                data-category="beauty"
              >
                beauty
              </a>
            </li>

            <li class="nav-item">
              <a
                href="#"
                class="nav-link category-link"
                data-category="fragrances"
              >
                fragrances
              </a>
            </li>

            <li class="nav-item">
              <a
                href="#"
                class="nav-link category-link"
                data-category="furniture"
              >
                furniture
              </a>
            </li>

            <li class="nav-item">
              <a
                href="#"
                class="nav-link category-link"
                data-category="groceries"
              >
                groceries
              </a>
            </li>
        
          </ul>
        </div>
      </div>
    </nav>

    <!-- Hero -->
    <header class="hero-section">
      <div class="overlay"></div>

      <div class="content text-center text-white">
        <h1 class="fw-bold mb-3">Welcome To Fake Store</h1>

        <p class="mb-4">Discover amazing products</p>

        <div class="w-50 mx-auto">
          <input
            type="text"
            id="searchInput"
            class="form-control form-control-lg"
            placeholder="Search Product..."
          />
        </div>
      </div>
    </header>

    <!-- Products -->
    <section class="container py-5">
      <div class="row g-4" id="rowData">

      
    </section>

    <!-- Modal -->
    <div class="modal fade" id="productModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Product Details</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body" id="modalBody"></div>
        </div>
      </div>
    </div>



    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
